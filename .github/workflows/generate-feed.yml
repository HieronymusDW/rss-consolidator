name: Generate RSS Feed

on:
  schedule:
    # 5:00 AM Amsterdam time = 4:00 AM UTC (UTC+1 in winter, UTC+2 in summer)
    # Using 3:00 AM UTC to account for summer time (CEST = UTC+2)
    # GitHub Actions cron runs in UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feed consolidator
        run: python merge_feeds.py

      - name: Commit and push updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet || git commit -m "Update feed $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Make.com digest
        run: curl -s -X POST "https://hook.eu1.make.com/7m5cevgjosoeao7t5j9nlv2aaqf7eryx"
